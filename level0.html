<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第0關：湊十彩虹橋</title>
    <style>
        body { font-family: 'PingFang TC', sans-serif; background-color: #f0f9ff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #game-container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 500px; }
        .ten-frame { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px auto; background: #e0f2fe; padding: 10px; border-radius: 10px; }
        .slot { width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px dashed #bae6fd; }
        .dot { width: 40px; height: 40px; border-radius: 50%; background: #f87171; }
        .btn { padding: 15px; font-size: 20px; cursor: pointer; border: none; background: #0ea5e9; color: white; border-radius: 10px; box-shadow: 0 4px #0369a1; width: 60px; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #0369a1; }
        #next-level-btn { display: none; margin-top: 20px; padding: 15px 30px; background: #22c55e; color: white; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 24px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .progress { color: #64748b; font-size: 18px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <h1 style="color: #0369a1;">🌈 第0關：湊十彩虹橋</h1>
    <div class="progress" id="progress">進度：0 / 20</div>
    <div id="question" style="font-size: 28px; font-weight: bold;"></div>
    <div class="ten-frame" id="tenFrame"></div>
    <div class="options" id="options" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;"></div>
    
    <a href="level1.html" id="next-level-btn">🌟 挑戰第ㄧ關！ 🌟</a>
</div>

<audio id="winSound" src="https://actions.google.com/sounds/v1/cartoon/clime_up_the_ladder.ogg"></audio>

<script>
    let currentNum = 0;
    let winCount = 0;

    function initGame() {
        if (winCount >= 20) {
            document.getElementById('question').innerText = "太棒了！你完成了！";
            document.getElementById('tenFrame').style.display = 'none';
            document.getElementById('options').style.display = 'none';
            document.getElementById('next-level-btn').style.display = 'inline-block';
            document.getElementById('winSound').play();
            return;
        }
        currentNum = Math.floor(Math.random() * 9) + 1;
        render();
    }

    function render() {
        document.getElementById('progress').innerText = `進度：${winCount} / 20`;
        document.getElementById('question').innerText = `${currentNum} + ? = 10`;
        const frame = document.getElementById('tenFrame');
        frame.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            if (i < currentNum) slot.innerHTML = '<div class="dot"></div>';
            frame.appendChild(slot);
        }
        const opt = document.getElementById('options');
        opt.innerHTML = '';
        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = i;
            btn.onclick = () => {
                if (currentNum + i === 10) {
                    winCount++;
                    initGame();
                } else {
                    btn.style.background = '#ef4444';
                    setTimeout(() => btn.style.background = '#0ea5e9', 500);
                }
            };
            opt.appendChild(btn);
        }
    }
    initGame();
</script>
</body>
</html>
