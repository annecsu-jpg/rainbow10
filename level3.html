<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第三關：跳跳虎過河 - 點選提示</title>
    <style>
        :root { --river-blue: #bae6fd; --stone-gray: #64748b; --tiger-orange: #fb923c; }
        body { font-family: 'PingFang TC', sans-serif; background-color: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #game-container { background: white; padding: 2rem; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 95%; max-width: 900px; }
        
        .question-area { background: #eff6ff; padding: 25px; border-radius: 20px; border: 3px solid #bfdbfe; margin-bottom: 10px; position: relative; }
        #question-text { font-size: 56px; font-weight: bold; color: #1e3a8a; margin: 0; }
        
        /* 提示按鈕與文字 */
        #hint-btn { background: #fef08a; border: 2px solid #eab308; padding: 8px 15px; border-radius: 50px; cursor: pointer; font-weight: bold; color: #854d0e; margin-top: 10px; transition: 0.2s; }
        #hint-btn:hover { background: #fde047; transform: scale(1.05); }
        #hint-text { display: none; color: #e11d48; font-size: 22px; font-weight: bold; margin-top: 15px; background: white; padding: 10px; border-radius: 10px; border: 1px dashed #fda4af; }

        .river { background: var(--river-blue); height: 180px; border-radius: 20px; display: flex; align-items: center; padding: 0 40px; gap: 12px; overflow-x: auto; border-bottom: 10px solid #38bdf8; position: relative; margin: 20px 0; }
        .stone { min-width: 50px; height: 50px; background: var(--stone-gray); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; border: 3px solid #334155; z-index: 5; }
        .stone.special { background: #f87171; border-color: #991b1b; transform: scale(1.1); }
        
        #tiger { font-size: 55px; position: absolute; bottom: 75px; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; }

        .progress-container { width: 100%; margin-top: 20px; }
        .progress-bar { width: 100%; height: 12px; background: #e2e8f0; border-radius: 6px; overflow: hidden; }
        #progress-fill { height: 100%; background: #22c55e; width: 0%; transition: 0.5s ease; }
        
        #next-level-btn { display: none; margin-top: 20px; padding: 15px 40px; background: #f59e0b; color: white; border-radius: 50px; text-decoration: none; font-size: 24px; font-weight: bold; box-shadow: 0 5px #b45309; }
    </style>
</head>
<body>

<div id="game-container">
    <h1 style="color: #0369a1; margin-top: 0;">🐯 第三關：跳跳虎過河 (0-20)</h1>
    
    <div class="question-area">
        <p id="question-text">載入中...</p>
        <button id="hint-btn" onclick="toggleHint()">💡 想不到嗎？點我給提示</button>
        <div id="hint-text"></div>
    </div>

    <div class="river" id="river">
        <div id="tiger">🐯</div>
    </div>

    <div class="progress-container">
        <div style="margin-bottom: 5px; color: #64748b; font-weight: bold;">答對進度：<span id="win-count-text">0</span> / 20</div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <a href="level4.html" id="next-level-btn">🌟 挑戰最後一關 🌟</a>
</div>

<audio id="jumpSound" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>

<script>
    let currentStart = 0;
    let currentTarget = 0;
    let winCount = 0;
    const tiger = document.getElementById('tiger');

    function initGame() {
        if (winCount >= 20) {
            document.querySelector('.question-area').innerHTML = "<h2>🎉 厲害！小老虎順利到家了！</h2>";
            document.getElementById('next-level-btn').style.display = 'inline-block';
            return;
        }

        // 重置提示狀態
        document.getElementById('hint-text').style.display = 'none';
        document.getElementById('hint-btn').style.display = 'inline-block';

        let type = Math.random() > 0.5 ? 'add' : 'sub';
        let hint = "";

        if (type === 'add') {
            currentStart = Math.floor(Math.random() * 8) + 2; 
            let add = Math.floor(Math.random() * 8) + 3;
            currentTarget = currentStart + add;
            document.getElementById('question-text').innerText = `${currentStart} + ${add} = ?`;
            
            if (currentTarget > 10 && currentStart < 10) {
                let toTen = 10 - currentStart;
                hint = `先跳到 10：${currentStart} + ${toTen} = 10<br>再往後跳剩下的：10 + ${add - toTen} = ${currentTarget}`;
            } else {
                document.getElementById('hint-btn').style.display = 'none'; // 簡單題目不給提示
            }
        } else {
            currentStart = Math.floor(Math.random() * 9) + 11; 
            let sub = Math.floor(Math.random() * 8) + 2;
            currentTarget = currentStart - sub;
            document.getElementById('question-text').innerText = `${currentStart} - ${sub} = ?`;
            
            // 破十法提示邏輯
            if (currentStart % 10 < sub) {
                let ones = currentStart % 10;
                hint = `個位數不夠減，先用 10 減：10 - ${sub} = ${10-sub}<br>再加上原本的 ${ones}：${10-sub} + ${ones} = ${currentTarget}`;
            } else {
                document.getElementById('hint-btn').style.display = 'none';
            }
        }

        document.getElementById('hint-text').innerHTML = hint;
        document.getElementById('win-count-text').innerText = winCount;
        document.getElementById('progress-fill').style.width = (winCount / 20 * 100) + '%';
        
        renderStones();
        moveTiger(currentStart);
    }

    function toggleHint() {
        const h = document.getElementById('hint-text');
        h.style.display = h.style.display === 'none' ? 'block' : 'none';
    }

    function renderStones() {
        const river = document.getElementById('river');
        const old = river.querySelectorAll('.stone');
        old.forEach(s => s.remove());

        for (let i = 0; i <= 20; i++) {
            const stone = document.createElement('div');
            stone.className = i === 10 ? 'stone special' : 'stone';
            stone.innerText = i;
            stone.onclick = () => checkAnswer(i, stone);
            river.appendChild(stone);
        }
    }

    function moveTiger(index) {
        const stones = document.querySelectorAll('.stone');
        const targetStone = stones[index];
        tiger.style.left = (targetStone.offsetLeft + 2) + 'px';
    }

    function checkAnswer(num, element) {
        if (num === currentTarget) {
            document.getElementById('jumpSound').play();
            moveTiger(num);
            winCount++;
            element.style.background = "#22c55e";
            setTimeout(initGame, 1500);
        } else {
            element.style.background = "#ef4444";
            setTimeout(() => {
                element.style.background = (num === 10) ? "#f87171" : "#64748b";
            }, 500);
        }
    }

    renderStones();
    setTimeout(initGame, 100);
</script>
</body>
</html>
