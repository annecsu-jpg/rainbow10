<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第三關：跳跳虎過河</title>
    <style>
        :root { --river-blue: #7dd3fc; --stone-gray: #94a3b8; --tiger-orange: #fb923c; }
        body { font-family: 'PingFang TC', sans-serif; background-color: #e0f2fe; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        #game-container { background: white; padding: 2rem; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 95%; max-width: 900px; position: relative; }
        
        /* 河流與石頭 */
        .river { background: var(--river-blue); height: 200px; border-radius: 20px; display: flex; align-items: center; justify-content: flex-start; padding: 0 40px; gap: 15px; overflow-x: auto; border-bottom: 10px solid #38bdf8; position: relative; margin: 20px 0; }
        .stone { min-width: 55px; height: 55px; background: var(--stone-gray); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; border: 4px solid #64748b; box-shadow: 0 5px #475569; position: relative; z-index: 5; }
        .stone:hover { transform: scale(1.1); background: #cbd5e1; }
        .stone.special { background: #f87171; border-color: #991b1b; } /* 10號石頭特別色 */
        
        /* 角色 */
        #tiger { font-size: 50px; position: absolute; bottom: 85px; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; pointer-events: none; }

        /* 題目與提示 */
        .display-area { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .question { font-size: 42px; font-weight: bold; color: #1e3a8a; background: #dbeafe; padding: 10px 30px; border-radius: 15px; }
        .hint { font-size: 20px; color: #ef4444; font-weight: bold; height: 30px; }

        #next-level-btn { display: none; margin-top: 20px; padding: 15px 30px; background: #f59e0b; color: white; border-radius: 50px; text-decoration: none; font-size: 24px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

<div id="game-container">
    <h1 style="color: #0369a1;">🐯 第三關：跳跳虎過河 (0-20)</h1>
    <div id="progress" style="font-size: 18px; color: #64748b;">挑戰進度：0 / 20</div>
    
    <div class="display-area">
        <div class="hint" id="hint-text"></div>
        <div class="question" id="question-text">8 + 5 = ?</div>
    </div>

    <div class="river" id="river">
        <div id="tiger">🐯</div>
        </div>

    <p style="color: #64748b;">點擊石頭，幫小老虎跳到正確的答案位置！</p>
    <a href="level4.html" id="next-level-btn">🎉 成功過河！進入最後一關 🎉</a>
</div>

<audio id="jumpSound" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>
<audio id="winSound" src="https://actions.google.com/sounds/v1/cartoon/clime_up_the_ladder.ogg"></audio>

<script>
    let currentStart = 0;
    let currentTarget = 0;
    let winCount = 0;
    const tiger = document.getElementById('tiger');

    function initGame() {
        if (winCount >= 20) {
            document.getElementById('question-text').innerText = "小老虎成功過河了！";
            document.getElementById('hint-text').innerText = "";
            document.getElementById('next-level-btn').style.display = 'inline-block';
            document.getElementById('winSound').play();
            return;
        }

        document.getElementById('progress').innerText = `挑戰進度：${winCount} / 20`;
        
        // 隨機產生題目 (加減混合，範圍 0-20，不含負數)
        let isAddition = Math.random() > 0.4; // 60% 機率加法
        
        if (isAddition) {
            currentStart = Math.floor(Math.random() * 9) + 1; // 1-9
            let add = Math.floor(Math.random() * (20 - currentStart)) + 1;
            currentTarget = currentStart + add;
            document.getElementById('question-text').innerText = `${currentStart} + ${add} = ?`;
            
            // 策略引導：如果是過 10 的加法
            if (currentStart < 10 && currentTarget > 10) {
                document.getElementById('hint-text').innerText = `💡 提示：先跳到 10 (加 ${10-currentStart})，再往後跳！`;
            } else {
                document.getElementById('hint-text').innerText = "";
            }
        } else {
            currentStart = Math.floor(Math.random() * 11) + 10; // 10-20
            let sub = Math.floor(Math.random() * currentStart) + 1;
            currentTarget = currentStart - sub;
            document.getElementById('question-text').innerText = `${currentStart} - ${sub} = ?`;
            
            // 策略引導：如果是退位的減法
            if (currentStart > 10 && currentTarget < 10) {
                document.getElementById('hint-text').innerText = `💡 提示：退回到 10 (減 ${currentStart-10})，再往前跳！`;
            } else {
                document.getElementById('hint-text').innerText = "";
            }
        }

        renderStones();
        moveTiger(currentStart);
    }

    function renderStones() {
        const river = document.getElementById('river');
        const oldStones = river.querySelectorAll('.stone');
        oldStones.forEach(s => s.remove());

        for (let i = 0; i <= 20; i++) {
            const stone = document.createElement('div');
            stone.className = i === 10 ? 'stone special' : 'stone';
            stone.innerText = i;
            stone.onclick = () => checkAnswer(i, stone);
            river.appendChild(stone);
        }
    }

    function moveTiger(index) {
        const stones = document.querySelectorAll('.stone');
        const targetStone = stones[index];
        // 考慮到 river 有 padding
        tiger.style.left = (targetStone.offsetLeft + 2) + 'px';
    }

    function checkAnswer(num, element) {
        if (num === currentTarget) {
            document.getElementById('jumpSound').play();
            moveTiger(num);
            winCount++;
            element.style.background = "#22c55e";
            
            setTimeout(() => {
                initGame();
            }, 1200);
        } else {
            element.style.background = "#ef4444";
            setTimeout(() => {
                element.style.background = (num === 10) ? "#f87171" : "#94a3b8";
            }, 500);
        }
    }

    // 初始化石頭以便獲取座標
    renderStones();
    // 延遲一下確保渲染完成再放老虎
    setTimeout(initGame, 100);
</script>
</body>
</html>
