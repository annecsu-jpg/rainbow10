<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第四關：小小生活家 - 豐富題型</title>
    <style>
        :root { --main-blue: #3b82f6; --bg-color: #f0fdf4; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #game-container { background: white; padding: 2.5rem; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; width: 95%; max-width: 700px; border: 6px solid #bbf7d0; }
        
        .story-box { background: #fdf2f8; padding: 30px; border-radius: 25px; border: 3px dashed #f9a8d4; margin-bottom: 25px; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #story-text { font-size: 28px; line-height: 1.5; color: #be185d; font-weight: bold; margin: 0; }
        .item-icon { font-size: 40px; margin-top: 10px; }

        .input-area { margin: 25px 0; display: flex; align-items: center; justify-content: center; gap: 15px; }
        input[type="number"] { width: 120px; font-size: 45px; padding: 10px; border-radius: 20px; border: 4px solid #cbd5e1; text-align: center; color: #1e293b; background: #f8fafc; }
        
        .btn { padding: 18px 50px; font-size: 24px; background: #ec4899; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 6px #be185d; transition: 0.2s; font-weight: bold; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px #be185d; }

        #medal-area { display: none; }
        .medal { font-size: 100px; margin-bottom: 20px; }
        .progress-text { color: #64748b; font-size: 20px; margin-bottom: 15px; font-weight: bold; }
        
        /* 動畫效果 */
        @keyframes success { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .correct-anim { animation: success 0.5s ease; }
    </style>
</head>
<body>

<div id="game-container">
    <h1 style="color: #db2777; margin-top: 0;">🍎 第四關：生活數學大挑戰</h1>
    <div class="progress-text">進度：<span id="win-count">0</span> / 20</div>
    
    <div class="story-box" id="box">
        <p id="story-text">準備出題中...</p>
        <div id="item-icon" class="item-icon"></div>
    </div>

    <div class="input-area">
        <input type="number" id="answer-input" placeholder="?" min="0" onkeyup="if(event.keyCode==13) checkAnswer()">
    </div>

    <button class="btn" onclick="checkAnswer()">檢查答案</button>

    <div id="medal-area">
        <div class="medal">🏆</div>
        <h2 style="color: #be185d;">太厲害了！你完成了所有挑戰！</h2>
        <p>你現在是 30 以內的數學小達人了！</p>
        <button class="btn" onclick="location.href='level1.html'" style="background: #3b82f6; box-shadow: 0 6px #1e40af;">回第一關玩</button>
    </div>
</div>

<audio id="winSound" src="https://actions.google.com/sounds/v1/cartoon/clime_up_the_ladder.ogg"></audio>

<script>
    let currentAnswer = 0;
    let winCount = 0;

    const names = ["小明", "小華", "小莉", "阿派", "美美", "爸爸", "媽媽", "老師"];
    const items = [
        { name: "蘋果", icon: "🍎" }, { name: "鉛筆", icon: "✏️" }, 
        { name: "草莓", icon: "🍓" }, { name: "餅乾", icon: "🍪" }, 
        { name: "小汽車", icon: "🚗" }, { name: "氣球", icon: "🎈" },
        { name: "糖果", icon: "🍬" }, { name: "小鴨", icon: "🦆" }
    ];

    const templates = [
        // 減法情境
        { t: "{n}有 {v1} 個{i}，給了{n2} {v2} 個後，還剩下幾個？", calc: (a, b) => a - b, type: 'sub' },
        { t: "桌上有 {v1} 個{i}，被吃掉了 {v2} 個，剩下幾個？", calc: (a, b) => a - b, type: 'sub' },
        { t: "{n}原本有 {v1} 元，買了 {v2} 元的{i}，還剩下多少元？", calc: (a, b) => a - b, type: 'sub' },
        
        // 加法情境
        { t: "我有 {v1} 個{i}，姐姐又送我 {v2} 個，現在共有幾個？", calc: (a, b) => a + b, type: 'add' },
        { t: "公車上原本有 {v1} 人，後來又上來了 {v2} 人，現在車上有幾人？", calc: (a, b) => a + b, type: 'add' },
        { t: "紅色的{i}有 {v1} 個，藍色的有 {v2} 個，合起來有幾個？", calc: (a, b) => a + b, type: 'add' },
        
        // 比較題 (差多少)
        { t: "{n}有 {v1} 個{i}，{n2}有 {v2} 個，{n}比{n2}多幾個？", calc: (a, b) => a - b, type: 'comp' },
        
        // 倍數題 (Double)
        { t: "一枝{i}要 {v1} 元，買 2 枝要多少錢？", calc: (a, b) => a + a, type: 'double' },
        { t: "小鳥有 2 隻腳，那 {v1} 隻小鳥共有幾隻腳？", calc: (a, b) => a * 2, type: 'double' }
    ];

    function generateQuestion() {
        if (winCount >= 20) {
            document.getElementById('box').style.display = 'none';
            document.querySelector('.input-area').style.display = 'none';
            document.querySelector('.btn').style.display = 'none';
            document.getElementById('medal-area').style.display = 'block';
            return;
        }

        document.getElementById('win-count').innerText = winCount;
        const temp = templates[Math.floor(Math.random() * templates.length)];
        const name1 = names[Math.floor(Math.random() * names.length)];
        const name2 = names.filter(n => n !== name1)[Math.floor(Math.random() * (names.length-1))];
        const item = items[Math.floor(Math.random() * items.length)];

        let v1, v2;

        if (temp.type === 'sub' || temp.type === 'comp') {
            v1 = Math.floor(Math.random() * 11) + 9; // 9-19
            v2 = Math.floor(Math.random() * 8) + 2;  // 2-9
            if (v1 < v2) [v1, v2] = [v2, v1]; // 確保不出現負數
            currentAnswer = v1 - v2;
        } else if (temp.type === 'double') {
            v1 = Math.floor(Math.random() * 9) + 2; // 2-10
            v2 = v1;
            currentAnswer = v1 + v1;
        } else {
            v1 = Math.floor(Math.random() * 9) + 2;
            v2 = Math.floor(Math.random() * 9) + 2;
            currentAnswer = v1 + v2;
        }

        let qText = temp.t
            .replace("{n}", name1)
            .replace("{n2}", name2)
            .replace("{i}", item.name)
            .replace("{v1}", v1)
            .replace("{v2}", v2);

        document.getElementById('story-text').innerText = qText;
        document.getElementById('item-icon').innerText = item.icon;
        document.getElementById('answer-input').value = "";
        document.getElementById('answer-input').focus();
    }

    function checkAnswer() {
        const inputElement = document.getElementById('answer-input');
        const userAns = parseInt(inputElement.value);
        
        if (userAns === currentAnswer) {
            document.getElementById('winSound').play();
            document.getElementById('game-container').classList.add('correct-anim');
            setTimeout(() => document.getElementById('game-container').classList.remove('correct-anim'), 500);
            
            winCount++;
            generateQuestion();
        } else {
            alert("算錯囉！可以畫圖或用手指數數看！");
            inputElement.value = "";
            inputElement.focus();
        }
    }

    generateQuestion();
</script>
</body>
</html>
