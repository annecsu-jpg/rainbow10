<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小一數學大冒險 - 湊十法</title>
    <style>
        body { font-family: 'PingFang TC', sans-serif; background-color: #f0f9ff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 90%; }
        h1 { color: #0369a1; margin-bottom: 10px; }
        .instruction { color: #64748b; margin-bottom: 20px; }
        
        /* 十格陣樣式 */
        .ten-frame { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px auto; background: #e0f2fe; padding: 10px; border-radius: 10px; border: 3px solid #7dd3fc; }
        .slot { width: 50px; height: 50px; background: white; border-radius: 50%; border: 2px dashed #bae6fd; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .dot { width: 40px; height: 40px; border-radius: 50%; background: #f87171; transition: transform 0.3s; }
        .dot.target { background: #60a5fa; animation: pulse 1s infinite; }

        /* 數字按鈕樣式 */
        .options { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .btn { padding: 15px 25px; font-size: 20px; cursor: pointer; border: none; background: #0ea5e9; color: white; border-radius: 10px; transition: 0.2s; box-shadow: 0 4px #0369a1; }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 #0369a1; }
        .btn.wrong { background: #ef4444; animation: shake 0.5s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="game-container">
    <h1>第一關：湊十彩虹橋</h1>
    <p class="instruction">數一數，還差幾個圓圈就能湊成 10 呢？</p>
    
    <div id="question" style="font-size: 24px; font-weight: bold; color: #334155;"></div>

    <div class="ten-frame" id="tenFrame">
        </div>

    <div class="options" id="options">
        </div>
    
    <div id="score" style="margin-top: 20px; color: #0ea5e9;">得分：0</div>
</div>

<script>
    let currentNum = 0;
    let score = 0;

    function initGame() {
        currentNum = Math.floor(Math.random() * 9) + 1; // 隨機 1-9
        renderFrame();
        renderOptions();
    }

    function renderFrame() {
        const frame = document.getElementById('tenFrame');
        const questionText = document.getElementById('question');
        frame.innerHTML = '';
        questionText.innerText = `${currentNum} + ? = 10`;

        for (let i = 0; i < 10; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            if (i < currentNum) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                slot.appendChild(dot);
            }
            frame.appendChild(slot);
        }
    }

    function renderOptions() {
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';
        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = i;
            btn.onclick = () => checkAnswer(i, btn);
            optionsContainer.appendChild(btn);
        }
    }

    function checkAnswer(ans, btn) {
        if (currentNum + ans === 10) {
            score += 10;
            document.getElementById('score').innerText = `得分：${score}`;
            btn.style.background = '#22c55e';
            setTimeout(() => {
                initGame();
            }, 500);
        } else {
            btn.classList.add('wrong');
            setTimeout(() => btn.classList.remove('wrong'), 500);
        }
    }

    initGame();
</script>

</body>
</html>
